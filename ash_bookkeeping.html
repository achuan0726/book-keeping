<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="記帳本">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1D9E75">
<title>澳洲記帳本</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231D9E75'/><text y='68' x='50' text-anchor='middle' font-size='55' fill='white'>💰</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --red-dark: #A32D2D;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --amber: #BA7517;
    --purple: #7F77DD;
    --coral: #D85A30;
    --pink: #D4537E;
    --gray: #888780;
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede8;
    --text: #1a1a1a;
    --text2: #6b6b68;
    --text3: #a0a09c;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --bg3: #3a3a3c;
      --text: #f5f5f5;
      --text2: #a0a09c;
      --text3: #6b6b68;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --green-light: #0a3d2b;
      --red-light: #3d1010;
      --blue-light: #0a1f3d;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
  
  /* Tab bar */
  .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg); border-top: 0.5px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .tab-btn { flex: 1; padding: 10px 4px 8px; text-align: center; cursor: pointer; border: none; background: transparent; color: var(--text3); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color .15s; }
  .tab-btn i { font-size: 22px; }
  .tab-btn.active { color: var(--green); }

  /* Screens */
  .screen { display: none; padding: 16px; }
  .screen.active { display: block; }

  /* Header */
  .page-header { font-size: 22px; font-weight: 700; margin-bottom: 16px; padding-top: 8px; }

  /* Month tabs */
  .month-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
  .month-tabs::-webkit-scrollbar { display: none; }
  .month-tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); white-space: nowrap; flex-shrink: 0; }
  .month-tab.active { background: var(--green); color: white; border-color: var(--green); font-weight: 500; }

  /* Person cards */
  .person-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .person-card { background: var(--bg2); border-radius: var(--radius-lg); padding: 14px; }
  .person-card .who { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-bottom: 10px; }
  .who-ash { background: var(--green-light); color: var(--green-dark); }
  .who-mathew { background: var(--blue-light); color: var(--blue); }
  .stat-line { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 0.5px solid var(--border); }
  .stat-line:last-of-type { border-bottom: none; }
  .stat-label { font-size: 11px; color: var(--text2); }
  .stat-val { font-size: 13px; font-weight: 600; }
  .stat-twd { font-size: 10px; color: var(--text3); display: block; text-align: right; }
  .net-line { display: flex; justify-content: space-between; align-items: baseline; padding-top: 8px; margin-top: 6px; border-top: 1px solid var(--border2); }
  .net-label { font-size: 13px; font-weight: 600; color: var(--text); }
  .net-val { font-size: 18px; font-weight: 700; }
  .col-green { color: var(--green); }
  .col-red { color: var(--red); }

  /* Section */
  .section-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }

  /* Cat bars */
  .cat-bar { margin-bottom: 10px; }
  .cat-bar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .bar-track { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }

  /* Chart */
  .chart-wrap { position: relative; width: 100%; height: 180px; margin-bottom: 20px; }

  /* Transaction list */
  .tx-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg2); border-radius: var(--radius); margin-bottom: 8px; }
  .tx-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .tx-amount { text-align: right; flex-shrink: 0; }
  .tx-aud { font-size: 14px; font-weight: 600; }
  .tx-twd { font-size: 11px; color: var(--text3); }

  /* Filters */
  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 12px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); white-space: nowrap; flex-shrink: 0; font-weight: 500; }
  .filter-btn.active { background: var(--green); color: white; border-color: var(--green); }

  /* Form */
  .form-card { background: var(--bg2); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 12px; font-size: 15px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); -webkit-appearance: none; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--green); }
  .btn-type { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .type-btn { padding: 10px; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border2); background: var(--bg); color: var(--text2); text-align: center; transition: all .15s; }
  .type-btn.active-exp { background: var(--red-light); color: var(--red-dark); border-color: var(--red); }
  .type-btn.active-inc { background: var(--green-light); color: var(--green-dark); border-color: var(--green); }
  .btn-submit { width: 100%; padding: 14px; border-radius: var(--radius); font-size: 16px; font-weight: 700; cursor: pointer; background: var(--green); color: white; border: none; margin-top: 4px; }
  .btn-submit:active { opacity: 0.85; transform: scale(0.98); }

  /* Receipt */
  .upload-zone { border: 2px dashed var(--border2); border-radius: var(--radius-lg); padding: 32px 20px; text-align: center; cursor: pointer; background: var(--bg2); }
  .upload-zone:active { background: var(--bg3); }
  .upload-zone input { display: none; }
  .receipt-img-wrap { border-radius: var(--radius); overflow: hidden; max-height: 220px; display: flex; align-items: center; justify-content: center; background: var(--bg3); margin-bottom: 12px; }
  .receipt-img-wrap img { max-width: 100%; max-height: 220px; object-fit: contain; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .item-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .item-row input { padding: 9px 10px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); }
  .item-row .item-name { flex: 1; }
  .item-row .item-price { width: 80px; }
  .del-btn { width: 30px; height: 30px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--bg3); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text2); font-size: 14px; }
  .mode-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .mode-btn { padding: 10px; border-radius: var(--radius); font-size: 13px; cursor: pointer; border: 1.5px solid var(--border2); background: var(--bg); color: var(--text2); text-align: center; font-weight: 500; }
  .mode-btn.active { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
  .btn-add-item { width: 100%; padding: 10px; border-radius: var(--radius); font-size: 14px; cursor: pointer; border: 1.5px dashed var(--border2); background: transparent; color: var(--text2); margin-bottom: 10px; }
  .items-total { display: flex; justify-content: space-between; padding: 10px 0 0; border-top: 0.5px solid var(--border); margin-top: 4px; }

  /* Price DB */
  .price-card { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
  .price-card-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .saving-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--green-light); color: var(--green-dark); font-weight: 600; }
  .store-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
  .store-row:last-child { border-bottom: none; padding-bottom: 0; }
  .store-name { font-size: 13px; color: var(--text2); }
  .store-price { font-size: 14px; font-weight: 600; }
  .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 5px; font-weight: 600; }
  .badge-cheap { background: var(--green-light); color: var(--green-dark); }
  .badge-exp { background: var(--red-light); color: var(--red-dark); }
  .tip-row { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--bg2); border-radius: var(--radius); margin-bottom: 8px; }
  .tip-text { font-size: 13px; color: var(--text); }

  /* Empty */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-state i { font-size: 40px; display: block; margin-bottom: 10px; }

  /* Toast */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Legend */
  .chart-legend { display: flex; gap: 14px; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>

<div id="screen-overview" class="screen active">
  <div class="page-header">總覽 <span id="overview-month-label" style="font-size:14px;font-weight:400;color:var(--text2)"></span></div>
  <div class="month-tabs" id="month-tabs"></div>
  <div class="person-cards">
    <div class="person-card" id="ash-card"></div>
    <div class="person-card" id="mathew-card"></div>
  </div>
  <div class="section-title">支出分類</div>
  <div id="cat-bars" style="margin-bottom:20px"></div>
  <div class="section-title">月支出趨勢</div>
  <div class="chart-legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(226,75,74,0.7)"></div>支出</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(29,158,117,0.7)"></div>收入</div>
  </div>
  <div class="chart-wrap"><canvas id="monthChart" role="img" aria-label="月支出趨勢">月支出趨勢</canvas></div>
</div>

<div id="screen-receipt" class="screen">
  <div class="page-header">掃收據</div>
  <div id="upload-section">
    <div class="upload-zone" onclick="document.getElementById('receipt-input').click()">
      <input type="file" id="receipt-input" accept="image/*" capture="environment" onchange="handleReceiptUpload(event)">
      <i class="ti ti-camera" style="font-size:40px;color:var(--text3);display:block;margin-bottom:12px"></i>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">拍照或選擇圖片</div>
      <div style="font-size:13px;color:var(--text2)">AI 自動辨識品項與金額</div>
    </div>
  </div>
  <div id="receipt-img-wrap" class="receipt-img-wrap" style="display:none"><img id="receipt-img" src="" alt="收據"></div>
  <div id="ai-status" style="display:none;text-align:center;padding:24px">
    <div class="spinner"></div>
    <div id="ai-msg" style="font-size:14px;color:var(--text2)">AI 辨識中...</div>
  </div>
  <div id="receipt-result" style="display:none">
    <div class="form-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:15px;font-weight:600">辨識結果</div>
        <button class="btn-add-item" style="width:auto;padding:6px 14px;margin:0;font-size:13px" onclick="addItemRow()"><i class="ti ti-plus"></i> 新增</button>
      </div>
      <div id="item-rows"></div>
      <div class="items-total">
        <span style="font-size:14px;color:var(--text2)">合計</span>
        <span style="font-size:18px;font-weight:700" id="items-total">$0.00</span>
      </div>
    </div>
    <div class="form-card">
      <div style="font-size:15px;font-weight:600;margin-bottom:12px">儲存設定</div>
      <div class="mode-toggle">
        <div class="mode-btn active" id="mode-single" onclick="setMode('single')"><i class="ti ti-receipt"></i> 整筆記錄</div>
        <div class="mode-btn" id="mode-items" onclick="setMode('items')"><i class="ti ti-list-details"></i> 逐項記錄</div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>日期</label><input type="date" id="r-date"></div>
        <div class="form-group"><label>記帳人</label><select id="r-who"><option>Ash</option><option>Mathew</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>類別</label><select id="r-cat">
          <option>Food / Groceries</option><option>Transportation</option><option>Rent</option>
          <option>Daily necessities</option><option>Fuel</option><option>Entertainment</option>
          <option>Phone</option><option>Others</option>
        </select></div>
        <div class="form-group"><label>商店</label><input type="text" id="r-store" placeholder="Woolworths"></div>
      </div>
      <button class="btn-submit" onclick="saveReceipt()">儲存記錄</button>
    </div>
    <div id="compare-section" style="display:none">
      <div class="section-title">歷史比價參考</div>
      <div id="compare-results"></div>
    </div>
  </div>
</div>

<div id="screen-add" class="screen">
  <div class="page-header">新增記帳</div>
  <div class="form-card">
    <div class="btn-type">
      <div class="type-btn active-exp" id="btn-exp" onclick="setType('expense')"><i class="ti ti-arrow-up-right"></i> 支出</div>
      <div class="type-btn" id="btn-inc" onclick="setType('income')"><i class="ti ti-arrow-down-left"></i> 收入</div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>日期</label><input type="date" id="f-date"></div>
      <div class="form-group"><label>記帳人</label><select id="f-who"><option>Ash</option><option>Mathew</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>金額（AUD）</label><input type="number" id="f-amount" placeholder="0.00" step="0.01" inputmode="decimal"></div>
      <div class="form-group"><label>類別</label><select id="f-cat">
        <option>Food / Groceries</option><option>Transportation</option><option>Rent</option>
        <option>Daily necessities</option><option>Fuel</option><option>Entertainment</option>
        <option>Phone</option><option>Salary</option><option>Saving</option><option>Others</option>
      </select></div>
    </div>
    <div class="form-group"><label>備註</label><input type="text" id="f-note" placeholder="例：ALDI 採購"></div>
    <div class="form-group"><label>商店（選填）</label><input type="text" id="f-store" placeholder="ALDI / Woolworths / Coles..."></div>
    <button class="btn-submit" onclick="addTx()">新增記錄</button>
  </div>
</div>

<div id="screen-list" class="screen">
  <div class="page-header">明細</div>
  <div class="filter-row" id="filter-row"></div>
  <div id="tx-list"></div>
</div>

<div id="screen-price" class="screen">
  <div class="page-header">比價</div>
  <div class="form-group" style="margin-bottom:14px">
    <input type="text" id="price-search" placeholder="搜尋品項..." oninput="renderPriceDB()" style="width:100%;padding:11px 12px;font-size:15px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text)">
  </div>
  <div id="price-db-list"></div>
  <div style="margin-top:20px;padding-top:16px;border-top:0.5px solid var(--border)">
    <div class="section-title">省錢建議</div>
    <div id="shopping-tips"></div>
  </div>
</div>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="showTab('overview')"><i class="ti ti-chart-pie"></i><span>總覽</span></button>
  <button class="tab-btn" onclick="showTab('receipt')"><i class="ti ti-scan"></i><span>掃收據</span></button>
  <button class="tab-btn" onclick="showTab('add')"><i class="ti ti-plus"></i><span>記帳</span></button>
  <button class="tab-btn" onclick="showTab('list')"><i class="ti ti-list"></i><span>明細</span></button>
  <button class="tab-btn" onclick="showTab('price')"><i class="ti ti-tag"></i><span>比價</span></button>
</nav>

<div class="toast" id="toast"></div>

<script>
const CAT_COLORS={'Food / Groceries':'#1D9E75','Transportation':'#185FA5','Rent':'#D85A30','Daily necessities':'#7F77DD','Fuel':'#BA7517','Entertainment':'#D4537E','Phone':'#888780','Salary':'#1D9E75','Saving':'#378ADD','Others':'#888780'};
const CAT_ICONS={'Food / Groceries':'ti-tools-kitchen-2','Transportation':'ti-car','Rent':'ti-home','Daily necessities':'ti-shopping-bag','Fuel':'ti-gas-station','Entertainment':'ti-device-gamepad-2','Phone':'ti-device-mobile','Salary':'ti-briefcase','Saving':'ti-piggy-bank','Others':'ti-dots'};
const MONTH_LABEL={'2026-02':'2月','2026-03':'3月','2026-04':'4月','2026-05':'5月'};
const TWD=22.8;
const fmt=n=>'$'+Math.abs(n).toFixed(2);
const fmtTWD=n=>'NT$'+Math.round(Math.abs(n)*TWD).toLocaleString();

const DEFAULT_DATA=[
  ['2026-02-06','Mathew','Saving','初始存款',13000,0,''],
  ['2026-02-06','Ash','Saving','初始存款',8710.21,0,''],

  ['2026-02-19','Mathew','Transportation','Bus to Melbourne',0,212,''],
  ['2026-02-19','Mathew','Rent','Hostel for a day',0,134,''],
  ['2026-02-19','Mathew','Food / Groceries',"McDonald's",0,62,"McDonald's"],
  ['2026-02-19','Mathew','Transportation','2 Myki + add up',0,54,''],
  ['2026-02-19','Ash','Food / Groceries','Coconut water Sydney',0,11.13,''],
  ['2026-02-19','Mathew','Food / Groceries','Icecream Sydney',0,11,''],
  ['2026-02-20','Mathew','Transportation','Transportation Sydney',0,22,''],
  ['2026-02-20','Ash','Transportation','Transportation Sydney',0,22.25,''],
  ['2026-02-20','Mathew','Food / Groceries','Sushi lunch Melbourne',0,36,''],
  ['2026-02-20','Ash','Daily necessities','Hair dryer',0,69,''],
  ['2026-02-20','Ash','Food / Groceries','Hostel Woolworths',0,25.63,'Woolworths'],
  ['2026-02-20','Mathew','Food / Groceries','Hostel dinner',0,33,''],

// localStorage
function loadData(){
  try{
    const saved=localStorage.getItem('ash_txdata');
    if(saved)return JSON.parse(saved);
  }catch(e){}
  return DEFAULT_DATA.map(r=>({date:r[0],who:r[1],cat:r[2],note:r[3],income:r[4],expense:r[5],store:r[6]}));
}
function saveData(){
  try{localStorage.setItem('ash_txdata',JSON.stringify(txData))}catch(e){}
}
function loadPrices(){
  try{
    const saved=localStorage.getItem('ash_pricedb');
    if(saved)return JSON.parse(saved);
  }catch(e){}
  return [...DEFAULT_PRICES];
}
function savePrices(){
  try{localStorage.setItem('ash_pricedb',JSON.stringify(priceDB))}catch(e){}
}

let txData=loadData();
let priceDB=loadPrices();
let addType='expense',listFilter='All',receiptMode='single',receiptItems=[],monthChart=null,selectedMonth='All';

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function showTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['overview','receipt','add','list','price'][i]===t));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+t).classList.add('active');
  if(t==='overview')renderOverview();
  if(t==='list')renderList();
  if(t==='price')renderPriceDB();
}

function setType(t){
  addType=t;
  document.getElementById('btn-exp').className='type-btn'+(t==='expense'?' active-exp':'');
  document.getElementById('btn-inc').className='type-btn'+(t==='income'?' active-inc':'');
}
function setMode(m){
  receiptMode=m;
  document.getElementById('mode-single').className='mode-btn'+(m==='single'?' active':'');
  document.getElementById('mode-items').className='mode-btn'+(m==='items'?' active':'');
}

function getMonths(){return[...new Set(txData.map(t=>t.date.slice(0,7)))].sort()}
function filteredByMonth(data){return selectedMonth==='All'?data:data.filter(t=>t.date.startsWith(selectedMonth))}

function renderOverview(){
  const months=getMonths();
  document.getElementById('month-tabs').innerHTML=
    ['All',...months].map(m=>`<button class="month-tab${selectedMonth===m?' active':''}" onclick="selectedMonth='${m}';renderOverview()">${m==='All'?'全部':MONTH_LABEL[m]||m}</button>`).join('');
  document.getElementById('overview-month-label').textContent=selectedMonth==='All'?'':MONTH_LABEL[selectedMonth]||selectedMonth;

  const data=filteredByMonth(txData);
  const calc=who=>{
    const d=data.filter(t=>t.who===who);
    const inc=d.reduce((s,t)=>s+t.income,0);
    const exp=d.reduce((s,t)=>s+t.expense,0);
    return{inc,exp,net:inc-exp};
  };
  const ash=calc('Ash'),math=calc('Mathew');

  const buildCard=(who,stats,whoClass)=>`
    <span class="who ${whoClass}">${who}</span>
    <div class="stat-line">
      <span class="stat-label">收入</span>
      <div><div class="stat-val col-green">${fmt(stats.inc)}</div><span class="stat-twd">${fmtTWD(stats.inc)}</span></div>
    </div>
    <div class="stat-line">
      <span class="stat-label">支出</span>
      <div><div class="stat-val col-red">${fmt(stats.exp)}</div><span class="stat-twd">${fmtTWD(stats.exp)}</span></div>
    </div>
    <div class="net-line">
      <span class="net-label">結餘</span>
      <div><div class="net-val ${stats.net>=0?'col-green':'col-red'}">${stats.net<0?'-':''}${fmt(stats.net)}</div><span class="stat-twd">${fmtTWD(stats.net)}</span></div>
    </div>`;
  document.getElementById('ash-card').innerHTML=buildCard('Ash',ash,'who-ash');
  document.getElementById('mathew-card').innerHTML=buildCard('Mathew',math,'who-mathew');

  const catExp={};
  data.forEach(t=>{if(t.expense>0&&t.cat!=='Saving')catExp[t.cat]=(catExp[t.cat]||0)+t.expense});
  const sorted=Object.entries(catExp).sort((a,b)=>b[1]-a[1]);
  const maxVal=sorted[0]?.[1]||1;
  document.getElementById('cat-bars').innerHTML=sorted.slice(0,7).map(([cat,val])=>`
    <div class="cat-bar">
      <div class="cat-bar-header">
        <span><i class="ti ${CAT_ICONS[cat]||'ti-tag'}" style="margin-right:5px;font-size:14px"></i>${cat}</span>
        <span style="color:var(--text2)">${fmt(val)}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${(val/maxVal*100).toFixed(1)}%;background:${CAT_COLORS[cat]||'#888'}"></div></div>
    </div>`).join('');

  const allM=getMonths();
  const mData={};
  txData.forEach(t=>{const m=t.date.slice(0,7);if(!mData[m])mData[m]={inc:0,exp:0};mData[m].inc+=t.income;mData[m].exp+=t.expense});
  if(monthChart){monthChart.destroy();monthChart=null}
  const isDark=matchMedia('(prefers-color-scheme: dark)').matches;
  monthChart=new Chart(document.getElementById('monthChart').getContext('2d'),{
    type:'bar',
    data:{labels:allM.map(m=>MONTH_LABEL[m]||m),datasets:[
      {label:'支出',data:allM.map(m=>parseFloat((mData[m]?.exp||0).toFixed(2))),backgroundColor:'rgba(226,75,74,0.7)',borderRadius:4},
      {label:'收入',data:allM.map(m=>parseFloat((mData[m]?.inc||0).toFixed(2))),backgroundColor:'rgba(29,158,117,0.7)',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:isDark?'#a0a09c':'#6b6b68',font:{size:13},autoSkip:false},grid:{display:false}},
        y:{ticks:{callback:v=>'$'+v.toLocaleString(),color:isDark?'#a0a09c':'#6b6b68',font:{size:11}},grid:{color:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)'}}
      }}
  });
}

function handleReceiptUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    document.getElementById('receipt-img').src=ev.target.result;
    document.getElementById('receipt-img-wrap').style.display='flex';
    document.getElementById('ai-status').style.display='block';
    document.getElementById('receipt-result').style.display='none';
    document.getElementById('upload-section').style.display='none';
    analyzeReceipt(ev.target.result,file.type||'image/jpeg');
  };
  reader.readAsDataURL(file);
}
async function analyzeReceipt(dataUrl,mimeType){
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mimeType,data:dataUrl.split(',')[1]}},
        {type:'text',text:'辨識這張收據的品項和金額（AUD）。只回傳JSON，不要其他文字：{"store":"商店名稱或空字串","items":[{"name":"品項名稱","price":金額數字}]}'}
      ]}]})
    });
    const data=await res.json();
    const text=data.content?.find(b=>b.type==='text')?.text||'{}';
    let parsed;try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim())}catch{parsed={store:'',items:[]}}
    showReceiptResult(parsed);
  }catch{
    document.getElementById('ai-msg').textContent='辨識失敗，請手動輸入';
    setTimeout(()=>showReceiptResult({store:'',items:[{name:'',price:0}]}),1200);
  }
}
function showReceiptResult(parsed){
  document.getElementById('ai-status').style.display='none';
  document.getElementById('receipt-result').style.display='block';
  if(parsed.store)document.getElementById('r-store').value=parsed.store;
  receiptItems=parsed.items?.length?parsed.items:[{name:'',price:0}];
  renderItemRows();
  document.getElementById('r-date').value=new Date().toISOString().slice(0,10);
  showComparePreview();
}
function renderItemRows(){
  document.getElementById('item-rows').innerHTML=receiptItems.map((it,i)=>`
    <div class="item-row">
      <input class="item-name" value="${it.name}" placeholder="品項名稱" oninput="receiptItems[${i}].name=this.value;showComparePreview()">
      <input class="item-price" type="number" step="0.01" value="${it.price||''}" placeholder="0.00" oninput="receiptItems[${i}].price=parseFloat(this.value)||0;updateTotal()" inputmode="decimal">
      <button class="del-btn" onclick="receiptItems.splice(${i},1);renderItemRows();showComparePreview()" aria-label="刪除"><i class="ti ti-x"></i></button>
    </div>`).join('');
  updateTotal();
}
function addItemRow(){receiptItems.push({name:'',price:0});renderItemRows()}
function updateTotal(){document.getElementById('items-total').textContent=fmt(receiptItems.reduce((s,it)=>s+(parseFloat(it.price)||0),0))}
function showComparePreview(){
  const names=receiptItems.map(it=>it.name.trim().toLowerCase()).filter(Boolean);
  const matches=priceDB.filter(p=>names.some(n=>p.item.toLowerCase().includes(n)||n.includes(p.item.toLowerCase())));
  const sec=document.getElementById('compare-section');
  if(!matches.length){sec.style.display='none';return}
  sec.style.display='block';
  const grouped={};matches.forEach(p=>{if(!grouped[p.item])grouped[p.item]=[];grouped[p.item].push(p)});
  document.getElementById('compare-results').innerHTML=Object.entries(grouped).map(([item,records])=>{
    const sorted=[...records].sort((a,b)=>a.price-b.price);const min=sorted[0].price;
    return`<div class="price-card"><div class="price-card-title">${item}</div>
      ${sorted.map(r=>`<div class="store-row"><span class="store-name">${r.store}</span>
        <span class="store-price ${r.price===min?'col-green':''}">${fmt(r.price)}${r.price===min?'<span class="badge badge-cheap">最便宜</span>':r.price===sorted[sorted.length-1].price&&sorted.length>1?'<span class="badge badge-exp">較貴</span>':''}</span>
      </div>`).join('')}</div>`;
  }).join('');
}
function saveReceipt(){
  const date=document.getElementById('r-date').value,who=document.getElementById('r-who').value,cat=document.getElementById('r-cat').value,store=document.getElementById('r-store').value;
  if(!date){showToast('請選擇日期');return}
  if(receiptMode==='single'){
    const total=receiptItems.reduce((s,it)=>s+(parseFloat(it.price)||0),0);
    txData.push({date,who,cat,note:store||cat,income:0,expense:parseFloat(total.toFixed(2)),store});
  }else{
    receiptItems.forEach(it=>{if(it.name||it.price)txData.push({date,who,cat,note:it.name||cat,income:0,expense:parseFloat((it.price||0).toFixed(2)),store})});
  }
  receiptItems.forEach(it=>{
    if(it.name&&it.price&&store){const ex=priceDB.find(p=>p.item===it.name&&p.store===store);if(ex){ex.price=it.price;ex.date=date}else priceDB.push({item:it.name,store,price:it.price,date})}
  });
  txData.sort((a,b)=>b.date.localeCompare(a.date));
  saveData();savePrices();
  document.getElementById('receipt-result').style.display='none';
  document.getElementById('receipt-img-wrap').style.display='none';
  document.getElementById('upload-section').style.display='block';
  document.getElementById('receipt-input').value='';
  document.getElementById('r-store').value='';
  showToast('已儲存！');showTab('list');
}

function addTx(){
  const date=document.getElementById('f-date').value,who=document.getElementById('f-who').value,cat=document.getElementById('f-cat').value,note=document.getElementById('f-note').value||cat,store=document.getElementById('f-store').value,amount=parseFloat(document.getElementById('f-amount').value)||0;
  if(!date||!amount){showToast('請填入日期與金額');return}
  txData.push({date,who,cat,note,income:addType==='income'?amount:0,expense:addType==='expense'?amount:0,store});
  txData.sort((a,b)=>b.date.localeCompare(a.date));
  saveData();
  ['f-amount','f-note','f-store'].forEach(id=>document.getElementById(id).value='');
  showToast('已新增！');showTab('list');
}

function renderList(){
  const cats=['All','Ash','Mathew','Food / Groceries','Transportation','Rent','Salary','Fuel'];
  const labels={'Food / Groceries':'飲食','Transportation':'交通','Rent':'房租','Salary':'薪資','Fuel':'油費'};
  document.getElementById('filter-row').innerHTML=cats.map(c=>`<button class="filter-btn${listFilter===c?' active':''}" onclick="listFilter='${c}';renderList()">${labels[c]||c}</button>`).join('');
  let filtered=txData;
  if(listFilter==='Ash')filtered=txData.filter(t=>t.who==='Ash');
  else if(listFilter==='Mathew')filtered=txData.filter(t=>t.who==='Mathew');
  else if(listFilter!=='All')filtered=txData.filter(t=>t.cat===listFilter);
  const sorted=[...filtered].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('tx-list').innerHTML=sorted.length?sorted.map(t=>{
    const isInc=t.income>0;const amt=isInc?t.income:t.expense;
    return`<div class="tx-item">
      <div class="tx-icon" style="background:${CAT_COLORS[t.cat]||'#888'}22"><i class="ti ${CAT_ICONS[t.cat]||'ti-tag'}" style="color:${CAT_COLORS[t.cat]||'#888'}"></i></div>
      <div class="tx-info">
        <div class="tx-name">${t.note}${t.store?` <span style="font-size:10px;color:var(--text3)">@ ${t.store}</span>`:''}</div>
        <div class="tx-meta">${t.date.slice(5).replace('-','/')} <span class="who ${t.who==='Ash'?'who-ash':'who-mathew'}">${t.who}</span> ${t.cat}</div>
      </div>
      <div class="tx-amount">
        <div class="tx-aud ${isInc?'col-green':''}">${isInc?'+':'-'}${fmt(amt)}</div>
        <div class="tx-twd">${isInc?'+':'-'}NT$${Math.round(amt*TWD).toLocaleString()}</div>
      </div>
    </div>`;
  }).join(''):`<div class="empty-state"><i class="ti ti-inbox"></i>沒有符合記錄</div>`;
}

function renderPriceDB(){
  const q=(document.getElementById('price-search')?.value||'').toLowerCase();
  const items={};
  priceDB.forEach(p=>{if(q&&!p.item.toLowerCase().includes(q)&&!p.store.toLowerCase().includes(q))return;if(!items[p.item])items[p.item]=[];items[p.item].push(p)});
  const list=document.getElementById('price-db-list');
  if(!Object.keys(items).length){list.innerHTML='<div class="empty-state"><i class="ti ti-tag"></i>上傳收據後自動累積比價資料</div>';return}
  list.innerHTML=Object.entries(items).map(([item,records])=>{
    const sorted=[...records].sort((a,b)=>a.price-b.price);const saving=sorted.length>1?sorted[sorted.length-1].price-sorted[0].price:0;
    return`<div class="price-card">
      <div class="price-card-title"><span>${item}</span>${saving>0?`<span class="saving-badge">最多省 ${fmt(saving)}</span>`:''}</div>
      ${sorted.map(r=>`<div class="store-row">
        <span class="store-name"><i class="ti ti-building-store" style="font-size:13px;margin-right:4px"></i>${r.store} <span style="color:var(--text3);font-size:11px">${r.date.slice(5).replace('-','/')}</span></span>
        <span class="store-price ${r.price===sorted[0].price?'col-green':''}">${fmt(r.price)}${r.price===sorted[0].price?'<span class="badge badge-cheap">最便宜</span>':r.price===sorted[sorted.length-1].price&&sorted.length>1?'<span class="badge badge-exp">較貴</span>':''}</span>
      </div>`).join('')}
    </div>`;
  }).join('');
  const savings=Object.entries(items).filter(([,r])=>r.length>1).map(([item,records])=>{const sorted=[...records].sort((a,b)=>a.price-b.price);return{item,cheap:sorted[0].store,saving:sorted[sorted.length-1].price-sorted[0].price}}).filter(s=>s.saving>0.01).sort((a,b)=>b.saving-a.saving);
  document.getElementById('shopping-tips').innerHTML=savings.length?savings.map(s=>`<div class="tip-row"><i class="ti ti-bulb" style="font-size:20px;color:var(--amber);flex-shrink:0"></i><div class="tip-text">買 <strong>${s.item}</strong> 選 <strong>${s.cheap}</strong>，比最貴省 <span class="col-green" style="font-weight:700">${fmt(s.saving)}</span></div></div>`).join(''):'<div style="font-size:13px;color:var(--text3);padding:12px 0">上傳更多收據後這裡會顯示建議</div>';
}

document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
document.getElementById('r-date').value=new Date().toISOString().slice(0,10);
renderOverview();
</script>
